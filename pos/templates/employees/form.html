{% extends "base.html" %}
{% block title %}{{ 'ແກ້ໄຂ' if employee else 'ເພີ່ມ' }}ພະນັກງານ{% endblock %}
{% block page_title %}{{ 'ແກ້ໄຂ' if employee else 'ເພີ່ມ' }}ພະນັກງານ{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">ຊື່ <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" required
                   value="{{ employee.name if employee else '' }}"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
            <input type="text" name="username" class="form-control" required
                   value="{{ employee.username if employee else '' }}"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">ລະຫັດຜ່ານ {{ '(ຖ້າບໍ່ປ່ຽນ ປ່ອຍວ່າງ)' if employee else '' }}</label>
            <input type="password" name="password" class="form-control"
                   {{ 'required' if not employee }}/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">ສິດທິ</label>
            <select name="role" id="roleSelect" class="form-select" onchange="showRoleNote(this.value)">
              {% set roles = [
                ('admin',      'ຜູ້ດູແລລະບົບ (Admin)'),
                ('cashier',    'ແຄັດເຊຍ (Cashier)'),
                ('accountant', 'ບັນຊີ (Accountant)'),
                ('driver',     'ໂຊເຟີລົດ (Driver)'),
                ('porter',     'ພະນັກງານແບກຫາມ (Porter)'),
              ] %}
              {% for val, label in roles %}
              <option value="{{ val }}" {{ 'selected' if employee and employee.role == val }}>{{ label }}</option>
              {% endfor %}
            </select>

            <!-- Role descriptions -->
            <div id="roleNote" class="mt-2 p-2 rounded small" style="border:1px solid var(--bs-border-color);background:var(--bs-secondary-bg);">
            </div>
          </div>
          <hr/>
          <p class="small fw-semibold text-muted mb-2"><i class="bi bi-wallet2 me-1"></i>ຂໍ້ມູນເງິນເດືອນ</p>
          <div class="row g-3 mb-4">
            <div class="col-6">
              <label class="form-label fw-semibold">ເງິນເດືອນພື້ນຖານ (ກີບ)</label>
              <input type="number" name="base_salary" class="form-control" min="0" step="1000"
                     value="{{ employee.base_salary if employee else 0 }}"/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">ອັດຕາ OT ຕໍ່ຊົ່ວໂມງ (ກີບ)</label>
              <input type="number" name="ot_rate" class="form-control" min="0" step="1000"
                     value="{{ employee.ot_rate if employee else 0 }}"/>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>ບັນທຶກ</button>
            <a href="{{ url_for('employees.list_employees') }}" class="btn btn-outline-secondary">ຍົກເລີກ</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const ROLE_NOTES = {
  admin: {
    color: '#dc2626', icon: 'bi-shield-fill-check',
    title: 'ຜູ້ດູແລລະບົບ — ເຂົ້າໄດ້ທຸກສ່ວນ',
    items: [
      '✅ ໜ້າຂາຍ POS',
      '✅ ສິນຄ້າ / Stock (ເພີ່ມ, ແກ້ໄຂ, ລຶບ)',
      '✅ ລູກຄ້າ',
      '✅ ໜີ້ສິນ',
      '✅ ລາຍຮັບ / ລາຍຈ່າຍ',
      '✅ ລາຍງານການຂາຍ',
      '✅ ເງິນເດືອນ & ເບີກລ່ວງໜ້າ',
      '✅ ຈັດການພະນັກງານ',
      '✅ ການຕັ້ງຄ່າລະບົບ',
      '⚠️ ສາມາດມີຫຼາຍຄົນເປັນ admin ໄດ້',
    ]
  },
  cashier: {
    color: '#2563eb', icon: 'bi-cash-register',
    title: 'ແຄັດເຊຍ — ສິດຂາຍ ແລະ ຈັດການສິນຄ້າ',
    items: [
      '✅ ໜ້າຂາຍ POS',
      '✅ ສິນຄ້າ / Stock (ເພີ່ມ, ແກ້ໄຂ)',
      '✅ ລູກຄ້າ (ເພີ່ມ, ແກ້ໄຂ)',
      '✅ ໜີ້ສິນ (ເບິ່ງ ແລະ ຮັບຊຳລະ)',
      '❌ ລາຍຮັບ / ລາຍຈ່າຍ',
      '❌ ລາຍງານ',
      '❌ ເງິນເດືອນ',
      '❌ ຈັດການພະນັກງານ',
      '❌ ການຕັ້ງຄ່າລະບົບ',
    ]
  },
  accountant: {
    color: '#16a34a', icon: 'bi-calculator',
    title: 'ບັນຊີ — ສິດເບິ່ງລາຍງານ ແລະ ການເງິນ',
    items: [
      '❌ ໜ້າຂາຍ POS',
      '❌ ສິນຄ້າ / Stock',
      '✅ ລູກຄ້າ (ເບິ່ງ)',
      '✅ ໜີ້ສິນ (ເບິ່ງ)',
      '✅ ລາຍຮັບ / ລາຍຈ່າຍ',
      '✅ ລາຍງານການຂາຍ',
      '✅ ເງິນເດືອນ & ເບີກລ່ວງໜ້າ',
      '❌ ຈັດການພະນັກງານ',
      '❌ ການຕັ້ງຄ່າລະບົບ',
    ]
  },
  driver: {
    color: '#d97706', icon: 'bi-truck',
    title: 'ໂຊເຟີລົດ — ສິດເຂົ້າລະບົບເທົ່ານັ້ນ',
    items: ['✅ Login ເຂົ້າລະບົບໄດ້', '❌ ບໍ່ມີສິດຕໍ່ section ພິເສດໃດ']
  },
  porter: {
    color: '#64748b', icon: 'bi-person-arms-up',
    title: 'ພະນັກງານແບກຫາມ — ສິດເຂົ້າລະບົບເທົ່ານັ້ນ',
    items: ['✅ Login ເຂົ້າລະບົບໄດ້', '❌ ບໍ່ມີສິດຕໍ່ section ພິເສດໃດ']
  },
};

function showRoleNote(role) {
  const note = ROLE_NOTES[role];
  const el = document.getElementById('roleNote');
  if (!note) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="fw-semibold mb-1" style="color:${note.color};">
      <i class="bi ${note.icon} me-1"></i>${note.title}
    </div>
    <ul class="mb-0 ps-3">
      ${note.items.map(i => `<li style="line-height:1.7;">${i}</li>`).join('')}
    </ul>`;
}
showRoleNote(document.getElementById('roleSelect').value);
</script>
{% endblock %}
