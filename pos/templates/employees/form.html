{% extends "base.html" %}
{% block title %}{{ 'ແກ້ໄຂ' if employee else 'ເພີ່ມ' }}ພະນັກງານ{% endblock %}
{% block page_title %}{{ 'ແກ້ໄຂ' if employee else 'ເພີ່ມ' }}ພະນັກງານ{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">ຊື່ <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" required
                   value="{{ employee.name if employee else '' }}"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
            <input type="text" name="username" class="form-control" required
                   value="{{ employee.username if employee else '' }}"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">ລະຫັດຜ່ານ {{ '(ຖ້າບໍ່ປ່ຽນ ປ່ອຍວ່າງ)' if employee else '' }}</label>
            <input type="password" name="password" class="form-control"
                   {{ 'required' if not employee }}/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">ສິດທິ</label>
            <select name="role" class="form-select">
              {% set roles = [
                ('admin',    'ຜູ້ດູແລລະບົບ (Admin)'),
                ('cashier',  'ແຄຊຽ (Cashier)'),
                ('accountant', 'ບັນຊີ (Accountant)'),
                ('driver',   'ໂຊເຟີລົດ (Driver)'),
                ('porter',   'ພະນັກງານແບກຫາມ (Porter)'),
              ] %}
              {% for val, label in roles %}
              <option value="{{ val }}" {{ 'selected' if employee and employee.role == val }}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
          <hr/>
          <p class="small fw-semibold text-muted mb-2"><i class="bi bi-wallet2 me-1"></i>ຂໍ້ມູນເງິນເດືອນ</p>
          <div class="row g-3 mb-4">
            <div class="col-6">
              <label class="form-label fw-semibold">ເງິນເດືອນພື້ນຖານ (ກີບ)</label>
              <input type="number" name="base_salary" class="form-control" min="0" step="1000"
                     value="{{ employee.base_salary if employee else 0 }}"/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">ອັດຕາ OT ຕໍ່ຊົ່ວໂມງ (ກີບ)</label>
              <input type="number" name="ot_rate" class="form-control" min="0" step="1000"
                     value="{{ employee.ot_rate if employee else 0 }}"/>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>ບັນທຶກ</button>
            <a href="{{ url_for('employees.list_employees') }}" class="btn btn-outline-secondary">ຍົກເລີກ</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
