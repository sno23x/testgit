{% extends "base.html" %}
{% block title %}{{ 'ແກ້ໄຂ' if employee else 'ເພີ່ມ' }}ພະນັກງານ{% endblock %}
{% block page_title %}{{ 'ແກ້ໄຂ' if employee else 'ເພີ່ມ' }}ພະນັກງານ{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">ຊື່ <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" required
                   value="{{ employee.name if employee else '' }}"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
            <input type="text" name="username" class="form-control" required
                   value="{{ employee.username if employee else '' }}"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">ລະຫັດຜ່ານ {{ '(ຖ້າບໍ່ປ່ຽນ ປ່ອຍວ່າງ)' if employee else '' }}</label>
            <input type="password" name="password" class="form-control"
                   {{ 'required' if not employee }}/>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">ສິດທິ</label>
            <select name="role" class="form-select">
              <option value="cashier" {{ 'selected' if employee and employee.role == 'cashier' }}>cashier</option>
              <option value="admin" {{ 'selected' if employee and employee.role == 'admin' }}>admin</option>
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>ບັນທຶກ</button>
            <a href="{{ url_for('employees.list_employees') }}" class="btn btn-outline-secondary">ຍົກເລີກ</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
