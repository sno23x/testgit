{% extends "base.html" %}
{% block title %}ໜ້າຂາຍ – POS{% endblock %}
{% block page_title %}ໜ້າຂາຍ (POS){% endblock %}

{% block content %}
<div class="row g-2" style="min-height:82vh;">

  <!-- Left: Search + suggestions -->
  <div class="col-lg-7 d-flex flex-column gap-2">

    <!-- Barcode / search bar -->
    <div class="card shadow-sm border-0">
      <div class="card-body py-2">
        <div class="input-group">
          <span class="input-group-text bg-primary text-white"><i class="bi bi-upc-scan"></i></span>
          <input type="text" id="productSearch" class="form-control form-control-lg fw-semibold"
                 placeholder="ສະແກນ Barcode ຫຼື ພິມຊື່ / ລະຫັດ..." autocomplete="off" autofocus/>
          <button class="btn btn-outline-secondary" onclick="clearSearch()" title="ລ້າງ">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Suggestion tabs -->
    <div class="card shadow-sm border-0 flex-grow-1">
      <div class="card-header py-1 px-3 d-flex gap-2 align-items-center">
        <ul class="nav nav-pills nav-sm mb-0" id="suggestTabs">
          <li class="nav-item">
            <button class="nav-link active py-1 px-2 small" onclick="loadSuggestions('bestseller', this)">
              <i class="bi bi-trophy me-1"></i>ຂາຍດີ
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link py-1 px-2 small" onclick="loadSuggestions('recent', this)">
              <i class="bi bi-clock-history me-1"></i>ຫາກໍ່ຂາຍ
            </button>
          </li>
        </ul>
        <small class="text-muted ms-auto" id="resultCount"></small>
      </div>
      <div class="card-body p-2 overflow-auto" style="max-height:55vh;">
        <div id="searchResults" class="row g-2"></div>
      </div>
    </div>
  </div>

  <!-- Right: Bill / Cart -->
  <div class="col-lg-5 d-flex flex-column">
    <div class="card shadow-sm border-0 flex-grow-1 d-flex flex-column">
      <div class="card-header bg-primary text-white fw-semibold d-flex justify-content-between align-items-center py-2">
        <span><i class="bi bi-receipt me-1"></i>ໃບບິນ</span>
        <div class="d-flex gap-1 align-items-center">
          <!-- Currency toggle -->
          <div class="btn-group btn-group-sm" role="group">
            <input type="radio" class="btn-check" name="currency" id="curLAK" value="LAK" checked/>
            <label class="btn btn-outline-light btn-sm py-0 px-2" for="curLAK">ກີບ</label>
            <input type="radio" class="btn-check" name="currency" id="curTHB" value="THB"/>
            <label class="btn btn-outline-light btn-sm py-0 px-2" for="curTHB">฿ ບາດ</label>
          </div>
          <button class="btn btn-sm btn-outline-light ms-1" onclick="clearBill()" title="ລ້າງ">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </div>

      <!-- Bill items -->
      <div class="flex-grow-1 overflow-auto p-2" id="billItems" style="max-height:38vh; min-height:100px;">
        <p class="text-muted text-center mt-4" id="emptyMsg">ຍັງບໍ່ມີລາຍການ</p>
      </div>

      <div class="card-footer p-2">
        <!-- Exchange rate row (hidden by default, toggled) -->
        <div id="rateRow" class="d-none mb-2 p-2 rounded bg-light border">
          <div class="d-flex align-items-center gap-2">
            <small class="fw-semibold text-nowrap">฿1 =</small>
            <input type="number" id="rateInput" class="form-control form-control-sm" style="width:100px;"
                   value="{{ rate }}" step="1" min="1" oninput="recalc()"/>
            <small>ກີບ</small>
            <small class="text-muted ms-auto" id="thbPreview"></small>
          </div>
        </div>

        <!-- Customer phone lookup -->
        <div class="mb-2 position-relative">
          <div class="input-group input-group-sm">
            <span class="input-group-text"><i class="bi bi-person-circle"></i></span>
            <input type="text" id="customerSearch" class="form-control"
                   placeholder="ຊອກລູກຄ້າ (ຊື່ ຫຼື ເບີໂທ)..." autocomplete="off"
                   oninput="customerLookup()"/>
          </div>
          <div id="customerSuggestions" class="dropdown-menu w-100 shadow-sm small" style="max-height:160px;overflow-y:auto;"></div>
          <input type="hidden" id="customerId" value=""/>
          <div id="selectedCustomer" class="small text-success mt-1 d-none"></div>
        </div>

        <!-- Discount -->
        <div class="d-flex align-items-center gap-2 mb-2">
          <label class="small fw-semibold text-nowrap">ສ່ວນຫຼຸດ:</label>
          <input type="number" id="discount" class="form-control form-control-sm"
                 style="width:110px;" value="0" min="0" oninput="recalc()"/>
          <span class="small text-muted">ກີບ</span>
        </div>

        <!-- Totals -->
        <div class="table-responsive mb-2">
          <table class="table table-sm mb-0">
            <tr>
              <td class="text-muted small">ລວມກ່ອນຫຼຸດ</td>
              <td class="text-end fw-semibold" id="subtotalDisplay">0 ກີບ</td>
            </tr>
            <tr>
              <td class="fw-bold">ລວມທັງໝົດ</td>
              <td class="text-end fw-bold text-primary fs-5" id="totalDisplay">0 ກີບ</td>
            </tr>
            <tr id="thbTotalRow" class="d-none">
              <td class="text-muted small">ເທົ່າກັບ THB</td>
              <td class="text-end text-warning fw-semibold" id="thbTotalDisplay"></td>
            </tr>
          </table>
        </div>

        <!-- Note -->
        <input type="text" id="noteInput" class="form-control form-control-sm mb-2"
               placeholder="ໝາຍເຫດ (ຖ້າມີ)..."/>

        <!-- Payment buttons -->
        <div class="d-grid gap-2">
          <div class="btn-group w-100">
            <button class="btn btn-success btn-lg" onclick="submitSale('cash')">
              <i class="bi bi-cash me-1"></i>ເງິນສົດ
            </button>
            <button class="btn btn-warning btn-lg text-dark" onclick="submitSale('debt')">
              <i class="bi bi-credit-card me-1"></i>ຕິດໜີ້
            </button>
          </div>
          <button class="btn btn-outline-secondary btn-sm" onclick="toggleRate()">
            <i class="bi bi-currency-exchange me-1"></i>ອັດຕາແລກປ່ຽນ
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Success modal -->
<div class="modal fade" id="successModal" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body text-center py-4">
        <i class="bi bi-check-circle-fill text-success" style="font-size:3rem;"></i>
        <h5 class="mt-2 fw-bold">ສໍາເລັດ!</h5>
        <p class="small text-muted mb-3" id="saleNoDisplay"></p>
        <div class="d-grid gap-2">
          <a id="receiptLink" href="#" target="_blank" class="btn btn-outline-primary btn-sm">
            <i class="bi bi-printer me-1"></i>ພິມໃບບິນ
          </a>
          <button class="btn btn-primary btn-sm" onclick="newBill()">
            <i class="bi bi-plus me-1"></i>ບິນໃໝ່
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const LAK_RATE = parseFloat("{{ rate }}") || 830;
let cart = [];
let rateVal = LAK_RATE;
const successModal = new bootstrap.Modal(document.getElementById('successModal'));

// ─── Barcode / search ───
let searchTimer, barcodeBuffer = '', barcodeTimer;
const searchInput = document.getElementById('productSearch');

searchInput.addEventListener('keydown', function(e) {
  // Barcode scanners fire very fast; detect rapid Enter after chars
  if (e.key === 'Enter') {
    clearTimeout(barcodeTimer);
    const q = barcodeBuffer.trim() || this.value.trim();
    barcodeBuffer = '';
    if (q) doSearch(q, true);
    e.preventDefault();
    return;
  }
  // Accumulate barcode buffer
  if (e.key.length === 1) {
    barcodeBuffer += e.key;
    clearTimeout(barcodeTimer);
    barcodeTimer = setTimeout(() => { barcodeBuffer = ''; }, 80);
  }
});

searchInput.addEventListener('input', function() {
  clearTimeout(searchTimer);
  const q = this.value.trim();
  if (!q) { document.getElementById('searchResults').innerHTML = ''; document.getElementById('resultCount').textContent = ''; return; }
  searchTimer = setTimeout(() => doSearch(q, false), 300);
});

function doSearch(q, autoAdd) {
  fetch(`/pos/search?q=${encodeURIComponent(q)}`)
    .then(r => r.json()).then(products => {
      if (autoAdd && products.length === 1) {
        addToCart(products[0]);
        searchInput.value = '';
        return;
      }
      renderResults(products);
    });
}

function clearSearch() {
  searchInput.value = '';
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('resultCount').textContent = '';
  searchInput.focus();
}

// ─── Suggestions ───
function loadSuggestions(mode, btn) {
  document.querySelectorAll('#suggestTabs .nav-link').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  fetch(`/pos/suggestions?mode=${mode}`)
    .then(r => r.json()).then(renderResults);
}

function renderResults(products) {
  const div = document.getElementById('searchResults');
  document.getElementById('resultCount').textContent = products.length ? `${products.length} ລາຍການ` : '';
  if (!products.length) { div.innerHTML = '<p class="text-muted small px-2">ບໍ່ພົບສິນຄ້າ</p>'; return; }
  div.innerHTML = products.map(p => `
    <div class="col-6 col-md-4">
      <div class="card product-tile h-100" onclick='addToCart(${JSON.stringify(p)})'>
        <div class="card-body p-2 text-center">
          <i class="bi bi-box-seam text-primary fs-4"></i>
          <p class="small fw-semibold mb-0 mt-1 text-truncate" title="${p.name}">${p.name}</p>
          <p class="small text-muted mb-1">${p.code}</p>
          <p class="fw-bold text-success mb-0">${Number(p.sell_price).toLocaleString()} ກີບ</p>
          ${p.price_thb > 0 ? `<small class="text-warning">฿${Number(p.price_thb).toLocaleString()}</small><br/>` : ''}
          <small class="text-muted">ຄ/ຫ: ${p.stock_qty} ${p.unit}</small>
        </div>
      </div>
    </div>
  `).join('');
}

// ─── Cart ───
function addToCart(p) {
  const idx = cart.findIndex(i => i.product_id === p.id);
  if (idx >= 0) {
    cart[idx].qty += 1;
  } else {
    cart.push({ product_id: p.id, name: p.name, unit: p.unit,
                unit_price: p.sell_price, qty: 1, item_discount: 0 });
  }
  renderCart();
}

function renderCart() {
  const div = document.getElementById('billItems');
  if (!cart.length) {
    div.innerHTML = '<p class="text-muted text-center mt-4" id="emptyMsg">ຍັງບໍ່ມີລາຍການ</p>';
    recalc(); return;
  }
  div.innerHTML = cart.map((it, idx) => {
    const discAmt = it.unit_price * it.qty * (it.item_discount / 100);
    const lineTotal = it.unit_price * it.qty - discAmt;
    return `
    <div class="border-bottom pb-1 mb-1">
      <div class="d-flex align-items-start gap-1">
        <div class="flex-grow-1">
          <span class="small fw-semibold">${it.name}</span>
          <div class="d-flex align-items-center gap-1 mt-1 flex-wrap">
            <input type="number" class="form-control form-control-sm qty-input" style="width:65px;"
                   value="${it.qty}" min="0.01" step="0.01"
                   onchange="updateQty(${idx}, this.value)" title="ຈໍານວນ"/>
            <small class="text-muted">${it.unit}</small>
            <small class="text-muted">× ${Number(it.unit_price).toLocaleString()}</small>
            <div class="input-group input-group-sm" style="width:90px;" title="ສ່ວນຫຼຸດ %">
              <input type="number" class="form-control form-control-sm" value="${it.item_discount}"
                     min="0" max="100" step="1" placeholder="ຫຼຸດ%"
                     onchange="updateDisc(${idx}, this.value)"/>
              <span class="input-group-text px-1">%</span>
            </div>
          </div>
        </div>
        <div class="text-end small ms-1">
          <span class="fw-bold text-primary">${Number(lineTotal).toLocaleString()}</span><br/>
          <button class="btn btn-sm btn-link text-danger p-0" onclick="removeItem(${idx})">
            <i class="bi bi-x-circle"></i>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
  recalc();
}

function updateQty(idx, val) {
  cart[idx].qty = Math.max(0.01, parseFloat(val) || 0.01);
  renderCart();
}
function updateDisc(idx, val) {
  cart[idx].item_discount = Math.min(100, Math.max(0, parseFloat(val) || 0));
  renderCart();
}
function removeItem(idx) { cart.splice(idx, 1); renderCart(); }
function clearBill() {
  cart = [];
  document.getElementById('discount').value = 0;
  document.getElementById('noteInput').value = '';
  clearCustomer();
  renderCart();
}

function recalc() {
  let subtotal = 0;
  cart.forEach(it => {
    const disc = it.unit_price * it.qty * (it.item_discount / 100);
    subtotal += it.unit_price * it.qty - disc;
  });
  const disc = parseFloat(document.getElementById('discount').value) || 0;
  const total = Math.max(0, subtotal - disc);
  rateVal = parseFloat(document.getElementById('rateInput').value) || LAK_RATE;

  document.getElementById('subtotalDisplay').textContent = Number(subtotal).toLocaleString() + ' ກີບ';
  document.getElementById('totalDisplay').textContent = Number(total).toLocaleString() + ' ກີບ';

  const isTHB = document.querySelector('input[name="currency"]:checked')?.value === 'THB';
  const thbRow = document.getElementById('thbTotalRow');
  if (isTHB && rateVal > 0) {
    thbRow.classList.remove('d-none');
    document.getElementById('thbTotalDisplay').textContent =
      '฿' + (total / rateVal).toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    document.getElementById('thbPreview').textContent =
      `ທັງໝົດ ≈ ฿${(total / rateVal).toLocaleString('th-TH', {maximumFractionDigits: 1})}`;
  } else {
    thbRow.classList.add('d-none');
  }
}

document.querySelectorAll('input[name="currency"]').forEach(r => r.addEventListener('change', recalc));
document.getElementById('discount').addEventListener('input', recalc);

function toggleRate() {
  document.getElementById('rateRow').classList.toggle('d-none');
  recalc();
}

// ─── Customer lookup ───
let custTimer;
function customerLookup() {
  clearTimeout(custTimer);
  const q = document.getElementById('customerSearch').value.trim();
  if (!q) { hideCustomerSuggestions(); return; }
  custTimer = setTimeout(() => {
    fetch(`/pos/customer-lookup?q=${encodeURIComponent(q)}`)
      .then(r => r.json()).then(list => {
        const box = document.getElementById('customerSuggestions');
        if (!list.length) { box.classList.remove('show'); return; }
        box.innerHTML = list.map(c => `
          <a class="dropdown-item py-1" href="#" onclick="selectCustomer(${c.id},'${c.name.replace(/'/g,"\\'")}','${(c.phone||'').replace(/'/g,"\\'")}',${c.debt});return false;">
            <span class="fw-semibold">${c.name}</span>
            ${c.phone ? `<small class="text-muted ms-1">${c.phone}</small>` : ''}
            ${c.debt > 0 ? `<span class="badge bg-danger ms-1 small">ໜີ້ ${Number(c.debt).toLocaleString()}</span>` : ''}
          </a>`).join('');
        box.classList.add('show');
      });
  }, 250);
}

function selectCustomer(id, name, phone, debt) {
  document.getElementById('customerId').value = id;
  document.getElementById('customerSearch').value = name + (phone ? ` (${phone})` : '');
  const info = document.getElementById('selectedCustomer');
  info.classList.remove('d-none');
  info.innerHTML = `<i class="bi bi-person-check me-1"></i>${name}` +
    (debt > 0 ? ` <span class="badge bg-warning text-dark">ໜີ້ ${Number(debt).toLocaleString()} ກີບ</span>` : '');
  hideCustomerSuggestions();
}

function clearCustomer() {
  document.getElementById('customerId').value = '';
  document.getElementById('customerSearch').value = '';
  document.getElementById('selectedCustomer').classList.add('d-none');
  hideCustomerSuggestions();
}

function hideCustomerSuggestions() {
  document.getElementById('customerSuggestions').classList.remove('show');
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('#customerSearch') && !e.target.closest('#customerSuggestions')) {
    hideCustomerSuggestions();
  }
});

// ─── Submit sale ───
function submitSale(type) {
  if (!cart.length) { alert('ກະລຸນາເລືອກສິນຄ້າກ່ອນ'); return; }
  const customerId = document.getElementById('customerId').value;
  if (type === 'debt' && !customerId) {
    alert('ກະລຸນາເລືອກລູກຄ້າເມື່ອຕິດໜີ້');
    document.getElementById('customerSearch').focus();
    return;
  }
  const currency = document.querySelector('input[name="currency"]:checked')?.value || 'LAK';
  const payload = {
    items: cart.map(i => ({
      product_id: i.product_id, qty: i.qty,
      unit_price: i.unit_price, item_discount: i.item_discount
    })),
    payment_type: type,
    customer_id: customerId || null,
    discount: parseFloat(document.getElementById('discount').value) || 0,
    currency: currency,
    note: document.getElementById('noteInput').value,
  };
  fetch('/pos/sale', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  }).then(r => r.json()).then(data => {
    if (data.error) { alert(data.error); return; }
    document.getElementById('saleNoDisplay').textContent = 'ເລກບິນ: ' + data.sale_no;
    document.getElementById('receiptLink').href = `/pos/receipt/${data.sale_id}`;
    successModal.show();
  }).catch(() => alert('ເກີດຂໍ້ຜິດພາດ ກະລຸນາລອງໃໝ່'));
}

function newBill() {
  successModal.hide();
  clearBill();
  clearSearch();
}

// Load best sellers on page load
loadSuggestions('bestseller', document.querySelector('#suggestTabs .nav-link'));
</script>
{% endblock %}
