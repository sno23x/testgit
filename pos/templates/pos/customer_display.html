<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ shop_name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wdth,wght@100,300;100,400;100,600;100,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans Lao', sans-serif;
      background: #080e1a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      border-bottom: 2px solid #334155;
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .shop-name {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.03em;
    }
    .header-right { display: flex; align-items: center; gap: 1.5rem; }
    .clock { font-size: 1.2rem; font-weight: 600; color: #94a3b8; font-variant-numeric: tabular-nums; }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity:1; box-shadow: 0 0 8px #22c55e; }
      50%      { opacity:.5; box-shadow: 0 0 2px #22c55e; }
    }

    /* ── Main ── */
    main { flex: 1; display: flex; flex-direction: column; padding: 1.5rem 2rem; min-height: 0; }

    /* ── IDLE ── */
    #screen-idle {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; gap: 2rem;
      animation: fadeUp .5s ease;
    }
    .idle-icon {
      font-size: 7rem;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }
    .idle-title { font-size: 3.5rem; font-weight: 800; color: #f1f5f9; line-height: 1.1; }
    .idle-sub   { font-size: 1.3rem; color: #64748b; }
    .idle-divider {
      width: 80px; height: 4px; border-radius: 2px;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
    }

    /* ── CART ── */
    #screen-cart {
      flex: 1; display: none; flex-direction: column; gap: 1rem;
      animation: fadeUp .3s ease;
    }
    .cart-title { font-size: 1rem; font-weight: 600; color: #64748b; letter-spacing: .05em; text-transform: uppercase; }

    .items-wrap { flex: 1; overflow-y: auto; padding-right: 4px; }
    .items-wrap::-webkit-scrollbar { width: 4px; }
    .items-wrap::-webkit-scrollbar-track { background: #1e293b; border-radius: 2px; }
    .items-wrap::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }

    .item-row {
      display: flex; align-items: center; gap: 1rem;
      padding: .75rem 1rem;
      border-radius: .75rem;
      border: 1px solid #1e293b;
      margin-bottom: .5rem;
      transition: background .2s;
    }
    .item-row:hover { background: #0f172a; }
    .item-num {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #1d4ed8, #4f46e5);
      color: #fff; font-size: .8rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .item-name  { flex: 1; font-weight: 600; font-size: 1.1rem; color: #e2e8f0; }
    .item-qty   { color: #94a3b8; font-size: .95rem; white-space: nowrap; }
    .item-price { font-weight: 700; color: #60a5fa; font-size: 1.05rem; white-space: nowrap; }

    /* ── Total bar ── */
    .total-bar {
      background: linear-gradient(135deg, #1d4ed8 0%, #4f46e5 100%);
      border-radius: 1rem;
      padding: 1.2rem 1.8rem;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 4px 24px rgba(79,70,229,.35);
      flex-shrink: 0;
    }
    .total-label  { font-size: 1.3rem; font-weight: 600; color: #bfdbfe; }
    .total-amount { font-size: 2.8rem; font-weight: 800; color: #fff; letter-spacing: .02em; font-variant-numeric: tabular-nums; }

    /* ── CONFIRMED ── */
    #screen-confirmed {
      flex: 1; display: none; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; gap: 1.5rem;
      animation: fadeUp .4s ease;
    }
    .confirm-ring {
      width: 130px; height: 130px; border-radius: 50%;
      background: radial-gradient(circle, #14532d, #15803d);
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem; color: #4ade80;
      box-shadow: 0 0 40px rgba(34,197,94,.4);
      animation: popIn .4s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes popIn {
      from { transform: scale(.4); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }
    .confirm-title  { font-size: 3.5rem; font-weight: 800; color: #4ade80; }
    .confirm-saleno { font-size: 1.2rem; color: #86efac; letter-spacing: .05em; }
    .confirm-total  {
      font-size: 2rem; font-weight: 700; color: #f1f5f9;
      background: #14532d; padding: .5rem 2rem; border-radius: .75rem;
    }
    .confirm-sub { font-size: 1.1rem; color: #4ade80; }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }

    footer {
      text-align: center; padding: .5rem;
      font-size: .75rem; color: #1e293b;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <header>
    <div class="shop-name"><i class="bi bi-shop me-2"></i>{{ shop_name }}</div>
    <div class="header-right">
      <div class="clock" id="cd-clock"></div>
      <div class="status-dot" title="ເຊື່ອມຕໍ່ແລ້ວ"></div>
    </div>
  </header>

  <main>
    <div id="screen-idle">
      <div class="idle-icon"><i class="bi bi-bag-heart-fill"></i></div>
      <div>
        <div class="idle-title">ຍິນດີຕ້ອນຮັບ</div>
        <div class="idle-divider mx-auto mt-3 mb-3" style="margin:12px auto;"></div>
        <div class="idle-sub">ກະລຸນາລໍຖ້າ ພະນັກງານກຳລັງດຳເນີນການ...</div>
      </div>
    </div>

    <div id="screen-cart">
      <div class="cart-title"><i class="bi bi-receipt me-1"></i>ລາຍການສິນຄ້າ</div>
      <div class="items-wrap"><div id="cd-items"></div></div>
      <div class="total-bar">
        <span class="total-label"><i class="bi bi-calculator me-2"></i>ລວມທັງໝົດ</span>
        <span class="total-amount" id="cd-total">0 ₭</span>
      </div>
    </div>

    <div id="screen-confirmed">
      <div class="confirm-ring"><i class="bi bi-check-lg"></i></div>
      <div class="confirm-title">ຂອບໃຈ!</div>
      <div class="confirm-saleno" id="cd-sale-no"></div>
      <div class="confirm-total" id="cd-confirm-total"></div>
      <div class="confirm-sub"><i class="bi bi-heart-fill me-1"></i>ສຳເລັດການຊຳລະ — ຂໍໃຫ້ໂຊກດີ</div>
    </div>
  </main>

  <footer>vannahome.shop</footer>

  <script src="https://cdn.jsdelivr.net/npm/socket.io@4.7.5/client-dist/socket.io.min.js"></script>
  <script>
    function tick() {
      const now = new Date();
      document.getElementById('cd-clock').textContent =
        now.toLocaleDateString('lo-LA') + '  ' + now.toLocaleTimeString('lo-LA');
    }
    setInterval(tick, 1000); tick();

    function show(name) {
      ['idle','cart','confirmed'].forEach(s => {
        document.getElementById('screen-' + s).style.display = s === name ? 'flex' : 'none';
      });
    }
    show('idle');

    let confirmTimer = null;
    const socket = io();

    socket.on('cart_update', function(data) {
      const items = data.items || [];
      if (!items.length) { show('idle'); return; }
      document.getElementById('cd-items').innerHTML = items.map((it, i) => `
        <div class="item-row">
          <div class="item-num">${i + 1}</div>
          <div class="item-name">${esc(it.name)}</div>
          <div class="item-qty">${it.qty} ${esc(it.unit || '')}</div>
          <div class="item-price">${Number(it.unit_price * it.qty).toLocaleString()} ₭</div>
        </div>`).join('');
      document.getElementById('cd-total').textContent = Number(data.total).toLocaleString() + ' ₭';
      show('cart');
    });

    socket.on('cart_confirmed', function(data) {
      document.getElementById('cd-sale-no').textContent = 'ເລກບິນ: ' + (data.sale_no || '');
      document.getElementById('cd-confirm-total').textContent = Number(data.total).toLocaleString() + ' ₭';
      show('confirmed');
      clearTimeout(confirmTimer);
      confirmTimer = setTimeout(() => show('idle'), 7000);
    });

    socket.on('cart_cleared', () => show('idle'));

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
