<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ shop_name }} – ໜ້າຈໍລູກຄ້າ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wdth,wght@100,300;100,400;100,600;100,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body {
      font-family: 'Noto Sans Lao', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .cd-header {
      background: linear-gradient(135deg, #1e3a5f 0%, #0e4d92 100%);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid #3b82f6;
    }
    .cd-header .shop-name {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .cd-header .clock {
      font-size: 1.1rem;
      color: #93c5fd;
    }

    /* ── Main area ── */
    .cd-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 2rem;
    }

    /* ── Idle screen ── */
    #screen-idle {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1.5rem;
      animation: fadeIn 0.5s ease;
    }
    #screen-idle .welcome-icon {
      font-size: 6rem;
      color: #3b82f6;
      animation: pulse 2.5s infinite;
    }
    #screen-idle h1 {
      font-size: 3rem;
      font-weight: 700;
      color: #f1f5f9;
    }
    #screen-idle p {
      font-size: 1.4rem;
      color: #94a3b8;
    }

    /* ── Cart screen ── */
    #screen-cart {
      flex: 1;
      display: none;
      flex-direction: column;
      gap: 1rem;
      animation: fadeIn 0.3s ease;
    }
    .cd-table-wrap {
      flex: 1;
      overflow-y: auto;
    }
    .cd-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1.15rem;
    }
    .cd-table thead th {
      background: #1e40af;
      color: #bfdbfe;
      padding: 0.75rem 1rem;
      text-align: left;
      font-weight: 600;
      position: sticky;
      top: 0;
    }
    .cd-table thead th:last-child { text-align: right; }
    .cd-table tbody tr {
      border-bottom: 1px solid #1e293b;
      transition: background 0.2s;
    }
    .cd-table tbody tr:hover { background: #1e293b; }
    .cd-table tbody td {
      padding: 0.7rem 1rem;
      vertical-align: middle;
    }
    .cd-table tbody td:last-child {
      text-align: right;
      font-weight: 700;
      color: #60a5fa;
    }
    .item-name { font-weight: 600; color: #f1f5f9; }
    .item-qty  { color: #94a3b8; font-size: 1rem; }

    /* ── Total bar ── */
    .cd-total-bar {
      background: linear-gradient(135deg, #1e40af 0%, #1d4ed8 100%);
      border-radius: 1rem;
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cd-total-bar .label {
      font-size: 1.5rem;
      font-weight: 600;
      color: #bfdbfe;
    }
    .cd-total-bar .amount {
      font-size: 2.5rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.02em;
    }

    /* ── Confirmed screen ── */
    #screen-confirmed {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1.5rem;
      animation: fadeIn 0.5s ease;
    }
    #screen-confirmed .confirm-icon {
      font-size: 7rem;
      color: #22c55e;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #screen-confirmed h1 {
      font-size: 3.5rem;
      font-weight: 800;
      color: #22c55e;
    }
    #screen-confirmed .sale-no {
      font-size: 1.3rem;
      color: #86efac;
    }
    #screen-confirmed .total-confirm {
      font-size: 2rem;
      font-weight: 700;
      color: #f1f5f9;
      background: #14532d;
      padding: 0.5rem 2rem;
      border-radius: 0.75rem;
    }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }
    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="cd-header">
    <div class="shop-name">
      <i class="bi bi-shop me-2"></i>{{ shop_name }}
    </div>
    <div class="clock" id="cd-clock"></div>
  </div>

  <!-- Main -->
  <div class="cd-main">

    <!-- Idle / Welcome -->
    <div id="screen-idle">
      <div class="welcome-icon"><i class="bi bi-bag-heart-fill"></i></div>
      <h1>ຍິນດີຕ້ອນຮັບ</h1>
      <p>ກະລຸນາລໍຖ້າໃນຂະນະທີ່ພະນັກງານກໍາລັງດຳເນີນການ...</p>
    </div>

    <!-- Cart items -->
    <div id="screen-cart">
      <div class="cd-table-wrap">
        <table class="cd-table">
          <thead>
            <tr>
              <th>#</th>
              <th>ສິນຄ້າ</th>
              <th>ຈໍານວນ</th>
              <th>ລາຄາ/ໜ່ວຍ</th>
              <th>ລວມ</th>
            </tr>
          </thead>
          <tbody id="cd-items"></tbody>
        </table>
      </div>
      <div class="cd-total-bar">
        <span class="label"><i class="bi bi-receipt me-2"></i>ລວມທັງໝົດ</span>
        <span class="amount" id="cd-total">0 ກີບ</span>
      </div>
    </div>

    <!-- Confirmed / Thank you -->
    <div id="screen-confirmed">
      <div class="confirm-icon"><i class="bi bi-check-circle-fill"></i></div>
      <h1>ຂອບໃຈ!</h1>
      <div class="sale-no" id="cd-sale-no"></div>
      <div class="total-confirm" id="cd-confirm-total"></div>
      <p style="color:#86efac; font-size:1.2rem;">ສໍາເລັດການຊໍາລະ — ຂໍໃຫ້ໂຊກດີ</p>
    </div>

  </div><!-- /cd-main -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/socket.io@4.7.5/client-dist/socket.io.min.js"></script>
  <script>
    // ── Clock ──
    function tickClock() {
      const now = new Date();
      document.getElementById('cd-clock').textContent =
        now.toLocaleDateString('lo-LA') + '  ' + now.toLocaleTimeString('lo-LA');
    }
    setInterval(tickClock, 1000); tickClock();

    // ── Screen switching ──
    function showScreen(name) {
      ['idle', 'cart', 'confirmed'].forEach(s => {
        const el = document.getElementById('screen-' + s);
        el.style.display = (s === name) ? 'flex' : 'none';
      });
    }
    showScreen('idle');

    let confirmTimer = null;

    // ── Socket.IO ──
    const socket = io();

    socket.on('cart_update', function(data) {
      const items = data.items || [];
      if (!items.length) { showScreen('idle'); return; }

      const tbody = document.getElementById('cd-items');
      tbody.innerHTML = items.map((it, i) => {
        const lineTotal = it.unit_price * it.qty;
        return `<tr>
          <td class="text-muted">${i + 1}</td>
          <td><span class="item-name">${escHtml(it.name)}</span></td>
          <td><span class="item-qty">${it.qty} ${escHtml(it.unit)}</span></td>
          <td>${Number(it.unit_price).toLocaleString()} ກີບ</td>
          <td>${Number(lineTotal).toLocaleString()} ກີບ</td>
        </tr>`;
      }).join('');

      document.getElementById('cd-total').textContent =
        Number(data.total).toLocaleString() + ' ກີບ';

      showScreen('cart');
    });

    socket.on('cart_confirmed', function(data) {
      document.getElementById('cd-sale-no').textContent = 'ເລກບິນ: ' + (data.sale_no || '');
      document.getElementById('cd-confirm-total').textContent =
        Number(data.total).toLocaleString() + ' ກີບ';
      showScreen('confirmed');

      // Return to idle after 6 seconds
      clearTimeout(confirmTimer);
      confirmTimer = setTimeout(() => showScreen('idle'), 6000);
    });

    socket.on('cart_cleared', function() {
      showScreen('idle');
    });

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
