<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ເຂົ້າສູ່ລະບົບ – POS ວັດສະດຸກໍ່ສ້າງ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body { background: linear-gradient(135deg,#1e3a5f 0%,#2d6a4f 100%); min-height:100vh; display:flex; align-items:center; }
    .login-card { max-width:400px; width:100%; }
  </style>
</head>
<body>
<div class="container">
  <div class="login-card mx-auto">
    <div class="card shadow-lg border-0">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-building display-4 text-primary"></i>
          <h4 class="fw-bold mt-2">ລະບົບ POS</h4>
          <p class="text-muted small">ຮ້ານວັດສະດຸກໍ່ສ້າງ</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
          {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">ຊື່ຜູ້ໃຊ້</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control" placeholder="username" required autofocus/>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">ລະຫັດຜ່ານ</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="password" required/>
            </div>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-box-arrow-in-right me-1"></i>ເຂົ້າສູ່ລະບົບ
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
