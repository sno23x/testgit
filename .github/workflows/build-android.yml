name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    branches: [main]
    paths:
      - 'mobile/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor dependencies
        working-directory: mobile
        run: npm install

      - name: Add Android platform
        working-directory: mobile
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: mobile
        run: npx cap sync android

      - name: Make Gradle executable
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build debug APK
        if: github.event.inputs.build_type != 'release'
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK (unsigned)
        if: github.event.inputs.build_type == 'release'
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload debug APK
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: vannahome-pos-debug-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: vannahome-pos-release-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
